name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build_linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Build Linux binaries
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu -p maya-scene-kit-cli -p maya-scene-kit-gui

      - name: Package Linux binaries
        run: |
          mkdir -p release
          linux_dir="release/maya-scene-kit-${{ github.ref_name }}-linux"
          mkdir -p "$linux_dir"
          cp target/x86_64-unknown-linux-gnu/release/maya-scene-kit "$linux_dir/maya-scene-kit"
          cp target/x86_64-unknown-linux-gnu/release/maya-scene-kit-gui "$linux_dir/maya-scene-kit-gui"
          cp LICENSE THIRD_PARTY_NOTICES.md README.md "$linux_dir/"
          tar czf release/maya-scene-kit-${{ github.ref_name }}-linux.tar.gz -C release "maya-scene-kit-${{ github.ref_name }}-linux"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: maya-scene-kit-linux-${{ github.ref_name }}
          path: release/maya-scene-kit-${{ github.ref_name }}-linux.tar.gz

  build_windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9

      - name: Build Windows binaries
        run: cargo build --release --locked -p maya-scene-kit-cli -p maya-scene-kit-gui

      - name: Package Windows binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $windowsDir = "release/maya-scene-kit-${{ github.ref_name }}-windows"
          New-Item -ItemType Directory -Force -Path $windowsDir | Out-Null
          Copy-Item target/release/maya-scene-kit.exe "$windowsDir/maya-scene-kit.exe"
          Copy-Item target/release/maya-scene-kit-gui.exe "$windowsDir/maya-scene-kit-gui.exe"
          Copy-Item LICENSE, THIRD_PARTY_NOTICES.md, README.md $windowsDir
          Compress-Archive -Path $windowsDir -DestinationPath "release/maya-scene-kit-${{ github.ref_name }}-windows.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: maya-scene-kit-windows-${{ github.ref_name }}
          path: release/maya-scene-kit-${{ github.ref_name }}-windows.zip

  build_python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux
          - os: windows-latest
            artifact_suffix: windows

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9

      - name: Build Python wheel
        run: uv run --with maturin maturin build --release --features extension-module --manifest-path crates/maya-scene-kit-python/Cargo.toml

      - name: Upload Python wheel artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: maya-scene-kit-python-${{ matrix.artifact_suffix }}-${{ github.ref_name }}
          path: target/wheels/maya_scene_kit-*.whl

  release:
    needs:
      - build_linux
      - build_windows
      - build_python
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: maya-scene-kit-linux-${{ github.ref_name }}

      - name: Download Windows artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: maya-scene-kit-windows-${{ github.ref_name }}

      - name: Download Python wheel artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: maya-scene-kit-python-linux-${{ github.ref_name }}

      - name: Download Windows Python wheel artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: maya-scene-kit-python-windows-${{ github.ref_name }}

      - name: Generate SHA256 checksums
        run: |
          sha256sum \
            maya-scene-kit-${{ github.ref_name }}-linux.tar.gz \
            maya-scene-kit-${{ github.ref_name }}-windows.zip \
            maya_scene_kit-*.whl \
            > SHA256SUMS.txt

      - name: Upload checksum artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: maya-scene-kit-sha256-${{ github.ref_name }}
          path: SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            maya-scene-kit-${{ github.ref_name }}-linux.tar.gz
            maya-scene-kit-${{ github.ref_name }}-windows.zip
            maya_scene_kit-*.whl
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
